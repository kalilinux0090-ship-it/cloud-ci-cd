name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t raj01docker/cloud-ci-cd:latest ./myapp

      - name: Push Docker image
        run: docker push raj01docker/cloud-ci-cd:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull raj01docker/cloud-ci-cd:latest
            docker rm -f cloud-ci-cd-app || true
            docker run -d --name cloud-ci-cd-app -p 8081:80 raj01docker/cloud-ci-cd:latest
